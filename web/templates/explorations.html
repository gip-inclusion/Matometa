{% extends "base.html" %}

{% block title_suffix %} - Explorations{% endblock %}

{% block content %}
<section class="s-title-02">
  <div class="s-title-02__container container">
    <div class="s-title-02__row row">
      <div class="s-title-02__col col-12">
        <div class="c-title">
          <div class="c-title__main">
            <h1>
              <i class="ri-compass-discover-line ri-xl fw-normal text-disabled"></i>
              Explorations
            </h1>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="s-section s-section--chat">
  <div class="s-section__container container">
    <div class="s-section__row row">
      <div class="s-section__col col-12">
        <!-- Controls -->
        <div class="d-flex align-items-center justify-content-end mb-3">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="hideToolsToggle">
            <label class="form-check-label small text-muted" for="hideToolsToggle">
              Masquer les details techniques
            </label>
          </div>
        </div>

        <!-- Chat output -->
        <div class="c-box chat-box">
          <div class="chat-output" id="chatOutput">
            <div class="empty-state" id="emptyState">
              <i class="ri-chat-3-line ri-3x text-disabled mb-3"></i>
              <p class="mb-0 text-muted">Posez une question pour commencer</p>
              <p class="small text-muted">Ex: "Combien de visiteurs sur les Emplois en decembre ?"</p>
            </div>
          </div>
        </div>

        <!-- Chat input -->
        <div class="chat-input-container mt-3">
          <div class="d-flex gap-2">
            <textarea
              class="form-control chat-input"
              id="chatInput"
              placeholder="Posez une question sur vos donnees Matomo ou Metabase..."
              rows="1"
            ></textarea>
            <button type="button" class="btn btn-primary btn-ico chat-send-btn" id="chatSendBtn" title="Envoyer">
              <i class="ri-send-plane-fill" aria-hidden="true"></i>
              <span class="visually-hidden">Envoyer</span>
            </button>
            <button type="button" class="btn btn-danger btn-ico chat-cancel-btn" id="chatCancelBtn" title="Annuler" style="display: none;">
              <i class="ri-stop-fill" aria-hidden="true"></i>
              <span class="visually-hidden">Annuler</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initChat();
  });
</script>
{% endblock %}
