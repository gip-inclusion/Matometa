name: Deploy Content Changes

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
      - 'skills/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ljt.cc >> ~/.ssh/known_hosts

      - name: Sync content
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            knowledge/ matometa@ljt.cc:/srv/matometa/knowledge/

          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            skills/ matometa@ljt.cc:/srv/matometa/skills/
